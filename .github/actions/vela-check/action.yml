# vela-check — the producer-facing PR gate (ADR 0001 Phase 0e).
#
# Drop this into a frontier repo's PR workflow to make the Vela binary the
# REQUIRED status check on every proposed change. It is the git-native
# replacement for the bespoke accept boundary: the model (or a producer) opens
# a PR, and this re-derives the frontier's truth as a status check, exactly
# where the producer already lives. Enable it as a required check in branch
# protection and merging a PR is only possible once the frozen verifiers agree.
#
# What it proves on every PR, from a clean checkout, for each frontier:
#   1. reproduce    — the frozen verifiers re-derive every witness from scratch
#                     (skipped for claim/cert frontiers that carry no witnesses;
#                     check + hash-parity still gate those).
#   2. check        — the structural / signal gate.
#   3. hash-parity  — the recomputed event_log_hash + snapshot_hash equal the
#                     committed vela.lock, i.e. the working tree IS the signed
#                     state (the ADR 0a/0b property: the hashes are load-path
#                     independent and materialize is deterministic, so a green
#                     check means what merges is what verifies).
#   4. check --strict runs NON-blocking: it surfaces the owner's proof-readiness
#                     / unsigned-reviewer debt, which is a key-custody item for
#                     the frontier owner, never a producer's PR to fix.
#
# It NEVER signs anything: the human-key accept stays the reviewer's signed
# event committed in the PR. This action only re-derives and reports.

name: vela-check
description: Re-derive Vela frontiers (reproduce + check + hash-parity) as a PR status check.

inputs:
  frontier:
    description: >
      A frontier directory path (e.g. frontiers/sidon-sets), OR `auto` to
      discover and gate every `frontiers/*/` directory that has a vela.lock.
    required: false
    default: auto
  vela-version:
    description: Pinned vela release tag to install (e.g. v0.710.0). Empty installs the latest release.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install vela (pinned binary, no from-source build)
      shell: bash
      run: |
        set -euo pipefail
        ver="${{ inputs.vela-version }}"
        # install.sh fetches the right platform asset from the GitHub release
        # and verifies its sha256 before placing the binary on PATH. It uses
        # bash features (set -o pipefail), so run it with bash, never `sh`
        # (dash on ubuntu-latest rejects pipefail).
        if [ -x "./install.sh" ]; then
          VELA_VERSION="$ver" bash ./install.sh
        else
          curl -fsSL https://raw.githubusercontent.com/constellate-science/vela/main/install.sh | VELA_VERSION="$ver" bash
        fi
        vela --version

    - name: re-derive (reproduce + check + hash-parity, per frontier)
      shell: bash
      run: |
        set -uo pipefail
        sel='${{ inputs.frontier }}'
        if [ "$sel" = "auto" ]; then
          # every git-backed frontier = a frontiers/<name>/ dir with a vela.lock
          mapfile -t fs < <(for d in frontiers/*/; do [ -f "${d}vela.lock" ] && echo "${d%/}"; done)
        else
          fs=("$sel")
        fi
        if [ "${#fs[@]}" -eq 0 ]; then
          echo "::error::no git-backed frontiers found (a frontiers/<name>/ dir with vela.lock)"
          exit 1
        fi
        echo "gating ${#fs[@]} frontier(s): ${fs[*]}"
        fail=0
        for f in "${fs[@]}"; do
          echo "::group::$f"
          lock="$f/vela.lock"
          if [ ! -f "$lock" ]; then
            echo "::error::$f: no vela.lock — cannot prove the working tree matches the signed state"; fail=1; echo "::endgroup::"; continue
          fi
          # 1. reproduce (skip cleanly for claim/cert frontiers with no witnesses)
          if ls "$f"/witnesses/*.witness.json >/dev/null 2>&1; then
            if ! vela reproduce "$f"; then echo "::error::$f: reproduce failed"; fail=1; fi
          else
            echo "$f: no witnesses (claim/cert frontier) — reproduce n/a; check + hash-parity still gate"
          fi
          # 2. check (non-strict structural / signal gate)
          if ! vela check "$f"; then echo "::error::$f: check failed"; fail=1; fi
          # 3. hash-parity — read the COMMITTED lock FIRST (materialize rewrites it).
          #    vela.lock is YAML; awk on the flat key: value lines avoids PyYAML.
          lsnap="$(awk '/^snapshot_hash:/{print $2}' "$lock")"
          lelog="$(awk '/^event_log_hash:/{print $2}' "$lock")"
          out="$(vela frontier materialize "$f" --json)"
          snap="$(printf '%s' "$out" | python3 -c 'import json,sys;print(json.load(sys.stdin).get("snapshot_hash",""))')"
          elog="$(printf '%s' "$out" | python3 -c 'import json,sys;print(json.load(sys.stdin).get("event_log_hash",""))')"
          echo "  committed lock: snapshot=$lsnap event_log=$lelog"
          echo "  recomputed:     snapshot=$snap event_log=$elog"
          if [ -z "$snap" ] || [ "$snap" != "$lsnap" ] || [ "$elog" != "$lelog" ]; then
            echo "::error::$f: hash-parity failed — working tree does not match the committed vela.lock"; fail=1
          else
            echo "$f: hash-parity OK"
          fi
          # 4. strict trust signal (non-blocking; owner key-custody item)
          vela check "$f" --strict || echo "::notice::$f has strict proof-readiness debt (non-blocking until the owner signs the reviewer events)"
          echo "::endgroup::"
        done
        if [ "$fail" -ne 0 ]; then
          echo "::error::one or more frontiers failed re-derivation"; exit 1
        fi
        echo "all frontiers re-derived: the working trees ARE the signed state"
